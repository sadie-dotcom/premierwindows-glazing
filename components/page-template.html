<!doctype html>
<!--
  Starter template for a new landing page.

  How to use:
  1. Copy this file to  /your-page-name/index.html
  2. Update <title>, meta description, canonical URL and og: tags.
  3. Build the page content inside <main>.
  4. Add the new page to /sitemap.xml.

  The shared CSS and JS live at absolute paths (/assets/...), so they work
  from any folder depth without changes.
-->
<html lang="en-AU">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a2540">

  <title>Page Title — Premier Windows Australia</title>
  <meta name="description" content="Concise, unique description for this page (~150 characters).">

  <link rel="canonical" href="https://glazing.premierwindows.com.au/your-page-name/">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Premier Windows Australia">
  <meta property="og:title" content="Page Title — Premier Windows Australia">
  <meta property="og:description" content="Concise, unique description for this page.">
  <meta property="og:url" content="https://glazing.premierwindows.com.au/your-page-name/">

  <link rel="icon" href="/assets/images/favicon.ico" sizes="any">
  <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">

  <link rel="preload" href="/assets/css/main.css" as="style">
  <link rel="stylesheet" href="/assets/css/main.css">

  <script src="/assets/js/main.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- Paste components/header.html here -->

  <main id="main">
    <section class="section">
      <div class="container">
        <h1>Page heading</h1>
        <p class="lead">Intro copy goes here.</p>
      </div>
    </section>
  </main>

  <!-- Paste components/footer.html here -->
</body>
</html>
